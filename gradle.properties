# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -Duser.country=en -Duser.language=en
kotlin.code.style=official
android.overridePathCheck=true
android.useAndroidX=true
android.nonTransitiveRClass=true

# Basic settings to ensure stable build
org.gradle.parallel=false
org.gradle.workers.max=1

# KSP + AGP 9.x built-in Kotlin 호환성: KSP가 kotlin.sourceSets DSL로 생성 소스를
# 등록하는 방식이 AGP 9.x에서 차단됨. 공식 우회 옵션.
android.disallowKotlinSourceSets=false
